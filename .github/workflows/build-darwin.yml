---
name: Build Darwin

on:
  push:
    branches:
      - main
    paths:
      - "flake.lock"
  pull_request:
    paths:
      - "flake.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-darwin:
    runs-on: macos-latest

    strategy:
      matrix:
        flake:
          - name: macbook-air
            path: ".#darwinConfigurations.macbook-air.config.system.build.toplevel"

    permissions:
      id-token: "write" # for magic-nix-cache-action
      contents: "read" # for magic-nix-cache-action

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - name: Build Darwin configuration
        run: nix build ${{ matrix.flake.path }} -L
